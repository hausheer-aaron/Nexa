name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nexa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit coverage
        run: npm run test:coverage:unit

      - name: Run component coverage
        run: npm run test:coverage:component

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: nexa/coverage/unit

      - name: Upload component coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-component
          path: nexa/coverage/component
